name: CI/CD Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and restart Docker
        shell: cmd
        run: |
          docker-compose down
          docker-compose up -d --build
          docker image prune -f
          docker-compose ps
