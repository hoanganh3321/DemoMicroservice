name: CI/CD Deploy

on:
  push:
    branches:
      - main  # Chỉ deploy khi push lên main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Copy toàn bộ code lên VPS
      - name: Copy code to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "."
          target: "/app/bookstore"

      # 3. SSH vào VPS, build lại và restart
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /app/bookstore

            # Tạo file .env chứa thông tin nhạy cảm
            cat > .env << EOF
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}
            EOF

            # Build lại image và restart toàn bộ services
            docker-compose down
            docker-compose up -d --build

            # Xóa image cũ không dùng để tiết kiệm disk
            docker image prune -f

            # Kiểm tra trạng thái
            docker-compose ps